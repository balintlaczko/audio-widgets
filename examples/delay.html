<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>body { font-family: monospace; padding: 10px; margin: 0; background: #f8f9fa; }</style>
</head>
<body>
    <button id="btn">Trigger Pluck with Delay</button>
    <br><br>
    <label>Delay Time: <span id="t-val">0.25</span>s</label><br>
    <input type="range" id="t-slider" min="0.1" max="1" value="0.25" step="0.01" style="width: 100%;"><br>
    <label>Feedback: <span id="f-val">0.4</span></label><br>
    <input type="range" id="f-slider" min="0" max="0.9" value="0.4" step="0.05" style="width: 100%;">
    <script>
        let synth, delay;
        const btn = document.getElementById('btn');

        btn.addEventListener('click', async () => {
            await Tone.start();
            if (!synth) {
                delay = new Tone.PingPongDelay("4n", 0.4).toDestination();
                synth = new Tone.PluckSynth().connect(delay);
                btn.textContent = "Play Pluck";
            }
            synth.triggerAttack("E4", "+0.05");
        });

        document.getElementById('t-slider').addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            document.getElementById('t-val').textContent = v;
            if (delay) delay.delayTime.rampTo(v, 0.1);
        });

        document.getElementById('f-slider').addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            document.getElementById('f-val').textContent = v;
            if (delay) delay.feedback.rampTo(v, 0.1);
        });
    </script>
</body>
</html>
