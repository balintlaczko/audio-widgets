<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>body { font-family: monospace; padding: 10px; margin: 0; background: #f8f9fa; }</style>
</head>
<body>
    <button id="btn">Trigger FM Synth</button>
    <br><br>
    <label>Harmonicity: <span id="h-val">1.5</span></label><br>
    <input type="range" id="h-slider" min="0.1" max="5" value="1.5" step="0.1" style="width: 100%;"><br>
    <label>Modulation Index: <span id="m-val">10</span></label><br>
    <input type="range" id="m-slider" min="1" max="50" value="10" step="1" style="width: 100%;">
    <script>
        let fmSynth;
        const btn = document.getElementById('btn');
        
        btn.addEventListener('click', async () => {
            await Tone.start();
            if (!fmSynth) {
                fmSynth = new Tone.FMSynth().toDestination();
                btn.textContent = "Play Note";
            }
            fmSynth.triggerAttackRelease("C4", "8n");
        });

        document.getElementById('h-slider').addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            document.getElementById('h-val').textContent = v;
            if (fmSynth) fmSynth.harmonicity.rampTo(v, 0.1);
        });

        document.getElementById('m-slider').addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            document.getElementById('m-val').textContent = v;
            if (fmSynth) fmSynth.modulationIndex.rampTo(v, 0.1);
        });
    </script>
</body>
</html>
